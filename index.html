<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Client - Azure App</title>
    <!-- Lien vers Bootstrap pour le design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #0078d4; border: none; } /* Bleu Azure */
        .btn-primary:hover { background-color: #005a9e; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Feedback Client</h2>
                    <p class="text-muted">Aidez-nous à nous améliorer</p>
                </div>
                
                <form method="POST" action="/api/feedback">
                    <div class="mb-3">
                        <label class="form-label">Adresse Email</label>
                        <input name="email" type="email" class="form-control" placeholder="nom@exemple.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Votre Message</label>
                        <textarea name="message" class="form-control" rows="4" placeholder="Dites-nous ce que vous en pensez..." required></textarea>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Envoyer le feedback</button>
                    </div>
                </form>
            </div>
            <p class="text-center mt-3 text-muted" style="font-size: 0.8rem;">Propulsé par Azure Cosmos DB & Functions</p>
        </div>
    </div>
</div>

</body>
</html>
